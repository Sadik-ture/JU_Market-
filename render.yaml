services:
  - type: web
    name: campus-trade
    runtime: image
    repo: https://github.com/Sadik-ture/JU_Market-
    plan: free
    dockerCommand: "php artisan serve --host=0.0.0.0 --port=10000"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://campus-trade.onrender.com
      - key: SESSION_DRIVER
        value: file
      - key: LOG_CHANNEL
        value: stack
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        value: campustrade_db
